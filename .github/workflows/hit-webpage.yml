name: Hit Web Page Cron Job
on:
  schedule:
    - cron: '*/30 * * * *'    # Runs every 10 minutes
   #- cron: '0 0 * * *' # Runs once per day, adjust as needed
  workflow_dispatch:  # Allows manual trigger

jobs:
  hit-url:
    runs-on: ubuntu-latest
    steps:
      - name: Curl OneByte App Server
        run: |
          echo "Hitting OneByte App Server..."
          curl -s https://onebyte-app-server.onrender.com/ > /dev/null
          echo "✅ OneByte App Server pinged"

      - name: Curl Ludo Pie App Server
        run: |
          echo "Hitting OneByte App Server..."
          curl -s https://ziqncznvqypzzovvpuxe.supabase.co/functions/v1/app_user_metrics > /dev/null
          echo "✅ Ludo Pie App Server pinged"
      
      - name: Curl Trading Monitor
        run: |
          echo "Hitting Trading Monitor..."
          curl -s https://trading-setup-monitor.onrender.com/ > /dev/null
          echo "✅ Trading Monitor pinged"
      - name: Curl Hello TV
        run: |
          echo "Hitting Hello TV..."
          curl -s https://hello-tv.onrender.com/ > /dev/null
          echo "✅ Hello TV pinged"          
      
      - name: Job Complete
        run: echo "🎯 All services pinged successfully at $(date)"
